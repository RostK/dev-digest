# Harness evals on CI.
#
# WHAT IT DOES
# On a pull request that touches a skill, an agent, CLAUDE.md, or the eval engine, this workflow
# runs ONLY the evals that the change implicates (evals/scripts/ci-detect.mjs decides which):
#
#   .claude/skills/<name>/**      → run evals/skills/<name>     (content tier — cheap, no proxy)
#   .claude/agents/<name>.md      → run evals/agents/<name>     (tool tier)
#
# The WORKFLOW tier (live harness: subagent dispatch, skill activation, CLAUDE.md routing) runs
# ONLY on a manual workflow_dispatch — never per PR push. It is the most expensive tier (a full
# run costs real OpenRouter credit and can exhaust a capped key mid-PR-cycle, 402/403-failing the
# OTHER tiers too) and the flakiest (cheap-model dependent), so per-push it produced red-X noise
# without gating anything. Trigger it from the Actions "Run workflow" dialog when an agent /
# CLAUDE.md / engine change warrants a live-harness check.
#
# A changed skill/agent that has NO written evals is NOT a failure — it is printed as
# "SKIP <name> (no evals)" in the detect step's log and job summary, and simply not tested.
#
# MODELS — everything runs on OpenRouter (EVAL_BACKEND=openrouter). No app UI: the model is a job
# parameter, editable in each job's `env:` block below or overridable per-run from the Actions
# "Run workflow" dialog (workflow_dispatch inputs). Split by tier:
#   - skills (content only)       → a cheap direct-OpenRouter model (DeepSeek V3). No proxy.
#   - agents + workflow (tools)   → Claude Haiku 4.5 via OpenRouter's Anthropic Skin. The Claude
#     Agent SDK speaks the Anthropic wire protocol, which the Skin serves natively for anthropic/*
#     slugs — so these tiers hit OpenRouter DIRECTLY (no LiteLLM proxy). A Claude-class model also
#     reliably drives the subagent-dispatch traces the tool tiers assert on; cheaper non-Anthropic
#     models under-drive them (measured) and would need the bundled evals/proxy sidecar to run at all.
#
# SECRET: set OPENROUTER_API_KEY in the repo's Actions secrets.
name: harness evals

on:
  pull_request:
    paths:
      - '.claude/skills/**'
      - '.claude/agents/**'
      - 'CLAUDE.md'
      - '.claude/CLAUDE.md'
      - 'evals/**'
      - '.github/workflows/evals.yml'
  workflow_dispatch:
    inputs:
      skills_model:
        description: 'OpenRouter slug for the skills (content) tier'
        default: 'deepseek/deepseek-chat'
      tool_model:
        description: 'OpenRouter slug for the agent + workflow (tool) tiers (anthropic/* → no proxy)'
        default: 'anthropic/claude-haiku-4.5'
      judge_model:
        description: 'OpenRouter slug for the LLM judge'
        default: 'google/gemini-2.5-flash'

permissions:
  contents: read

concurrency:
  group: harness-evals-${{ github.ref }}
  cancel-in-progress: true

# EVAL_BACKEND is a constant every job/step inherits. The MODEL SWITCH lives in each job's `env:`
# below (skills vs tool tiers use different defaults) and in the workflow_dispatch inputs above —
# change a default in one place and the Run-workflow dialog stays in sync.
env:
  EVAL_BACKEND: openrouter

jobs:
  # ── 1. Decide which suites this diff implicates ──────────────────────────────
  detect:
    name: detect changed artifacts
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.detect.outputs.skills }}
      agents: ${{ steps.detect.outputs.agents }}
      run_workflow: ${{ steps.detect.outputs.run_workflow }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the PR base commit to diff against

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compute changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base='${{ github.event.pull_request.base.sha }}'
            head='${{ github.event.pull_request.head.sha }}'
          else
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
            head="$(git rev-parse HEAD)"
          fi
          echo "Diffing $base...$head"
          {
            echo 'files<<__EOF__'
            git diff --name-only "$base" "$head"
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Map changes → suites
        id: detect
        working-directory: evals
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: node scripts/ci-detect.mjs

      - name: Job summary
        if: always()
        # Pass detector outputs via env (safe quoting) and use `if` blocks — the `[ -n "" ] && echo`
        # idiom returns exit 1 when a value is empty, which trips bash `set -e` and fails the step.
        env:
          SKILLS: ${{ steps.detect.outputs.skills }}
          AGENTS: ${{ steps.detect.outputs.agents }}
          RUN_WORKFLOW: ${{ steps.detect.outputs.run_workflow }}
          SKIPPED_SKILLS: ${{ steps.detect.outputs.skipped_skills }}
          SKIPPED_AGENTS: ${{ steps.detect.outputs.skipped_agents }}
        run: |
          {
            echo '### Harness eval selection'
            echo ''
            echo "- skills → run: \`${SKILLS}\`"
            echo "- agents → run: \`${AGENTS}\`"
            echo "- workflow tier: \`${RUN_WORKFLOW}\`"
            if [ -n "$SKIPPED_SKILLS" ]; then echo "- SKIP skills (no evals): \`${SKIPPED_SKILLS}\`"; fi
            if [ -n "$SKIPPED_AGENTS" ]; then echo "- SKIP agents (no evals): \`${SKIPPED_AGENTS}\`"; fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 2. Skill (content) tier — cheap DeepSeek, direct OpenRouter, no proxy ────
  skills:
    name: skill · ${{ matrix.skill }}
    needs: detect
    if: needs.detect.outputs.skills != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJSON(needs.detect.outputs.skills) }}
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      EVAL_MODEL: ${{ inputs.skills_model || 'deepseek/deepseek-chat' }}
      EVAL_JUDGE_MODEL: ${{ inputs.judge_model || 'google/gemini-2.5-flash' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install eval deps
        working-directory: evals
        run: pnpm install --frozen-lockfile
      - name: Run skill eval
        working-directory: evals
        # Trailing slash anchors the path filter so "architecture-reviewer" can't also match
        # "architecture-reviewer-lite" (substring), and one skill's dir is selected exactly.
        run: pnpm exec vitest run "skills/${{ matrix.skill }}/"

  # ── 3. Agent (tool) tier — Claude Haiku via OpenRouter's Anthropic Skin (no proxy) ──
  agents:
    name: agent · ${{ matrix.agent }}
    needs: detect
    if: needs.detect.outputs.agents != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJSON(needs.detect.outputs.agents) }}
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      EVAL_MODEL: ${{ inputs.tool_model || 'anthropic/claude-haiku-4.5' }}
      EVAL_JUDGE_MODEL: ${{ inputs.judge_model || 'google/gemini-2.5-flash' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install eval deps
        working-directory: evals
        run: pnpm install --frozen-lockfile
      - name: Run agent eval
        working-directory: evals
        run: pnpm exec vitest run "agents/${{ matrix.agent }}/"

  # ── 4. Workflow tier — live harness on Claude Haiku via the Anthropic Skin (no proxy) ──
  # MANUAL-ONLY (workflow_dispatch) + ADVISORY (continue-on-error): this tier drives the REAL
  # harness (subagent dispatch, skill activation, CLAUDE.md routing) in a live session, so it is
  # inherently the flakiest, most model-dependent, and most expensive tier — a per-PR run burned
  # real credit on every push and its red X read as a PR failure while gating nothing. It also
  # carries a deliberate cheap-model canary — the engineering-insights DESCRIPTION-activation
  # case, which the skill's own SKILL.md documents as unreliable without its Stop hook and which
  # a cheap model won't self-invoke. Trigger it from the Actions "Run workflow" dialog. The
  # skills + agents tiers stay hard per-PR gates.
  workflow:
    name: workflow tier (advisory)
    needs: detect
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      EVAL_MODEL: ${{ inputs.tool_model || 'anthropic/claude-haiku-4.5' }}
      EVAL_JUDGE_MODEL: ${{ inputs.judge_model || 'google/gemini-2.5-flash' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install eval deps
        working-directory: evals
        run: pnpm install --frozen-lockfile
      - name: Run workflow evals
        working-directory: evals
        run: pnpm eval:workflow
